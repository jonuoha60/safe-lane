<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/start.css') }}">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@100..900&display=swap" rel="stylesheet">

    <title>Driver Test Simulator</title>
</head>
<body>

    <button class="exit-btn" onclick="goBack()">
    <svg xmlns="http://www.w3.org/2000/svg" 
         width="20" height="20" 
         viewBox="0 0 24 24" 
         fill="none" stroke="currentColor" 
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    <span>Exit</span>
</button>
<div class="simulate">
        <div class="countdown-timer"></div>

    <div class="simulate-container">
        <div class="simulate-header">
            <h1>Welcome to the SafeLane Test Simulator</h1>
            <p class="simulate-subtext">
                Prepare for your driving test and manage your ticket/payment information.
            </p>
           
        </div>

    

        <div class="ticket-section">
            <button id="ticket-btn" onclick="handleTicket()" class="ticket-btn">Get Ticket Number</button>
        </div>

        <p class="tick-number"></p>

        <div class="payment-section">
           
        </div>
    </div>
</div>
    <script src="{{ url_for('static', filename='index.js')}}"></script>

</body>
</html>
