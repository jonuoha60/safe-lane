<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <title>Signup</title>
</head>
<body>

<!-- Flash Messages -->
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
    {% for category, message in messages %}
        {% if category == 'error' %}
            <div class="alert alert-error">
                {{ message }}
                <button type="button" class="alert-close">&times;</button>
            </div>
        {% else %}
            <div class="alert alert-success">
                {{ message }}
                <button type="button" class="alert-close">&times;</button>
            </div>
        {% endif %}
    {% endfor %}
{% endif %}
{% endwith %}

<!-- Form -->
<div class="form-container">
    <form action="" method="POST" class="signup-form">
        <h3 class="form-title">Login</h3>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter email" class="form-input"/>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password" class="form-input"/>
        </div>
        <button type="submit" class="submit-btn">Login</button>
<p class="form-footer">Don't have an account? <a href="/auth/signup">Signup here</a></p>

        
    </form>
</div>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const alerts = document.querySelectorAll(".alert");
    
    alerts.forEach(alert => {
        // Auto-hide after 5 seconds
        setTimeout(() => {
            alert.style.animation = "fadeOut 0.5s forwards";
        }, 3000);

        // Close on click
        const closeBtn = alert.querySelector(".alert-close");
        if(closeBtn) {
            closeBtn.addEventListener("click", () => {
                alert.style.animation = "fadeOut 0.5s forwards";
            });
        }
    });
});
</script>
</body>
</html>
